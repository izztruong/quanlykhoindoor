services:
  postgres:
    image: postgres:16-alpine
    container_name: kho_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kho_user
      POSTGRES_PASSWORD: kho_pass
      POSTGRES_DB: kho_db
    ports:
      - "5432:5432"
    volumes:
      - kho_postgres_data:/var/lib/postgresql/data

volumes:
  kho_postgres_data:
